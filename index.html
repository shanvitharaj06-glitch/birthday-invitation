<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Invitation 🎉</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(270deg,#ff6ec4,#7873f5,#42e695);
    background-size:600% 600%;
    animation:bg 10s infinite;
    overflow:hidden;
}

@keyframes bg{
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

/* Card */
.card{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(255,255,255,0.2);
    padding:25px;
    border-radius:20px;
    text-align:center;
    color:white;
    backdrop-filter:blur(10px);
    width:350px;
    box-shadow:0 0 25px rgba(255,255,255,0.4);
}

h1{
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{text-shadow:0 0 10px white;}
    to{text-shadow:0 0 20px yellow;}
}

.btn{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:#ff4081;
    color:white;
    border-radius:20px;
    cursor:pointer;
}

.btn:hover{
    transform:scale(1.1);
}

/* Cake Section */
#cakeSection{
    display:none;
    text-align:center;
    color:white;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* Cake */
.cake{
    width:200px;
    height:120px;
    background:#ff69b4;
    border-radius:10px;
    position:relative;
    margin:auto;
}

.candle{
    width:10px;
    height:30px;
    background:white;
    position:absolute;
    top:-30px;
    left:95px;
}

.flame{
    width:10px;
    height:10px;
    background:orange;
    border-radius:50%;
    position:absolute;
    top:-40px;
    left:95px;
    animation:flicker 0.3s infinite;
}

@keyframes flicker{
    from{opacity:1;}
    to{opacity:0.3;}
}

/* Fireworks */
.firework{
    position:absolute;
    width:5px;
    height:5px;
    background:white;
    border-radius:50%;
    animation:explode 1s linear infinite;
}

@keyframes explode{
    0%{transform:scale(1);}
    100%{transform:scale(10);opacity:0;}
}

/* Gallery */
.gallery{
    display:flex;
    gap:10px;
    margin-top:20px;
    justify-content:center;
}

.gallery img{
    width:80px;
    height:80px;
    border-radius:10px;
}

/* WhatsApp Button */
.whatsapp{
    margin-top:15px;
    background:#25D366;
    padding:10px;
    border-radius:20px;
    color:white;
    text-decoration:none;
    display:inline-block;
}

</style>
</head>

<body>

<!-- Music -->
<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3" type="audio/mp3">
</audio>

<!-- Invitation -->
<div class="card" id="invite">
    <h1>🎂 You're Invited!</h1>
    <h2>Shanvitha's Birthday 🎉</h2>

    <p>📅 10 April<br>⏰ 6 PM<br>📍 My Home</p>

    <button class="btn" onclick="startParty()">🎉 Join Party</button>
</div>

<!-- Cake Section -->
<div id="cakeSection">
    <h1>🎉 Happy Birthday 🎉</h1>

    <div class="cake">
        <div class="candle"></div>
        <div class="flame" id="flame"></div>
    </div>

    <button class="btn" onclick="cutCake()">🎂 Cut Cake</button>

    <!-- Gallery -->
    <div class="gallery">
        <img src="https://source.unsplash.com/100x100/?birthday">
        <img src="https://source.unsplash.com/100x100/?cake">
        <img src="https://source.unsplash.com/100x100/?party">
    </div>

    <!-- WhatsApp -->
    <a class="whatsapp" href="https://wa.me/91XXXXXXXXXX" target="_blank">
        📱 RSVP on WhatsApp
    </a>
</div>

<script>

function startParty(){
    document.getElementById("invite").style.display="none";
    document.getElementById("cakeSection").style.display="block";

    document.getElementById("music").play();

    // Fireworks
    for(let i=0;i<20;i++){
        let f=document.createElement("div");
        f.className="firework";
        f.style.top=Math.random()*100+"%";
        f.style.left=Math.random()*100+"%";
        document.body.appendChild(f);
    }
}

function cutCake(){
    document.getElementById("flame").style.display="none";
    alert("🎂 Cake Cut Successfully! 🎉");
}

</script>

</body>
</html>
